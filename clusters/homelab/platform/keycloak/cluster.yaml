apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-pg
  namespace: keycloak
spec:
  instances: 1
  storage:
    size: 5Gi
    storageClass: longhorn
  affinity:
    nodeSelector:
      kubernetes.io/hostname: node5
  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
