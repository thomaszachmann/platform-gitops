apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://codecentric.github.io/helm-charts
      chart: keycloakx
      targetRevision: 7.1.11
      helm:
        values: |
          command:
            - "/opt/keycloak/bin/kc.sh"
            - "start"
            - "--http-enabled=true"
            - "--http-port=8080"
            - "--hostname-strict=false"
            - "--proxy-headers=xforwarded"

          extraEnv: |
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: admin123
            - name: JAVA_OPTS_APPEND
              value: -Djgroups.dns.query=keycloak-keycloakx-headless

          service:
            type: NodePort

          database:
            vendor: postgres
            hostname: keycloak-pg-rw
            port: 5432
            database: keycloak
            existingSecret: keycloak-pg-app

    - repoURL: https://git.procilon.duckdns.org/forgejo_admin/platform-gitops.git
      targetRevision: HEAD
      path: clusters/homelab/platform/keycloak

  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
